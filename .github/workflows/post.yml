name: Habbinson IG auto-poster

# Fires at 10:00, 13:00, 17:00 IST  (= 04:30, 07:30, 11:30 UTC).
# GitHub cron can be delayed a few minutes under load — that's fine, the post_at gate
# only posts when IST time has reached each blog's slot.
on:
  schedule:
    - cron: "30 4 * * *"
    - cron: "30 7 * * *"
    - cron: "30 11 * * *"
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # to commit the updated tracker back

concurrency:
  group: ig-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Write configs from secrets
        env:
          IG_CONFIG: ${{ secrets.IG_CONFIG }}
          WP_CONFIG: ${{ secrets.WP_CONFIG }}
        run: |
          printf '%s' "$IG_CONFIG" > .ig_config.json
          printf '%s' "$WP_CONFIG" > .wp_config.json

      - name: Post due IG outputs
        run: python cloud_post.py

      - name: Commit updated tracker
        run: |
          git config user.name "habbinson-bot"
          git config user.email "habbinson-bot@users.noreply.github.com"
          git add publish-tracker.json
          git commit -m "tracker update [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
