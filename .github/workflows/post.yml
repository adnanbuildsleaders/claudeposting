name: Habbinson IG auto-poster

# Our slots (avoid the 10AM/5PM IST slots used by the other poster):
#   NEW posts  -> 14:00 & 20:00 IST  (= 08:30 & 14:30 UTC)
#   BACKLOG    -> 23:00 IST          (= 17:30 UTC)
# Each slot has a +1h catch-up cron because GitHub schedules can be delayed/skipped under load;
# the post_at gate makes extra runs harmless (they post only what's actually due).
on:
  schedule:
    - cron: "30 8 * * *"     # 14:00 IST  (new slot 1)
    - cron: "30 9 * * *"     # 14:30 IST  catch-up
    - cron: "30 14 * * *"    # 20:00 IST  (new slot 2)
    - cron: "30 15 * * *"    # 20:30 IST  catch-up
    - cron: "30 17 * * *"    # 23:00 IST  (backlog)
    - cron: "30 18 * * *"    # 23:30 IST  catch-up
    - cron: "30 20 * * *"    # 02:00 IST  final catch-up
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # to commit the updated tracker back

# Opt the JS actions (checkout@v4 / setup-python@v5) into the Node.js 24 runtime so the
# "Node.js 20 actions are deprecated" warning goes away (forced default from 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ig-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Write IG config from secret
        env:
          IG_CONFIG: ${{ secrets.IG_CONFIG }}
        run: |
          printf '%s' "$IG_CONFIG" > .ig_config.json

      - name: Post due IG outputs
        run: python cloud_post.py

      - name: Commit updated tracker
        run: |
          git config user.name "habbinson-bot"
          git config user.email "habbinson-bot@users.noreply.github.com"
          git add publish-tracker.json
          git commit -m "tracker update [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
