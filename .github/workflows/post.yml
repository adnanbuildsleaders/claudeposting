name: Habbinson IG auto-poster

# Slots: NEW posts -> 14:00 & 20:00 IST, BACKLOG -> 23:00 IST (set per-item in post_at).
# GitHub scheduled runs are frequently DELAYED/DROPPED under load (we saw 8-12h drift), so instead
# of firing only at the slots we POLL every 30 minutes, all day. The post_at gate makes this fully
# idempotent: each item posts exactly once, at/after its slot, and never double-posts. Public repo
# => unlimited Actions minutes, so frequent polling is free and the most reliable PC-off option.
on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 min (poll; post_at decides what actually posts)
  workflow_dispatch: {}        # lets you run it manually from the Actions tab

permissions:
  contents: write              # to commit the updated tracker back

# Opt the JS actions (checkout@v4 / setup-python@v5) into the Node.js 24 runtime so the
# "Node.js 20 actions are deprecated" warning goes away (forced default from 2026-06-16).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ig-poster
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt

      - name: Write IG config from secret
        env:
          IG_CONFIG: ${{ secrets.IG_CONFIG }}
        run: |
          printf '%s' "$IG_CONFIG" > .ig_config.json

      - name: Post due IG outputs
        run: python cloud_post.py

      - name: Commit updated tracker
        run: |
          git config user.name "habbinson-bot"
          git config user.email "habbinson-bot@users.noreply.github.com"
          git add publish-tracker.json
          git commit -m "tracker update [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
